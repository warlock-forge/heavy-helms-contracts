name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Foundry
        uses: ./.github/actions/setup-foundry

      - name: Check formatting
        run: forge fmt --check

      - name: Run tests
        run: forge test -vv

      # coverage requires via_ir disabled, --ir-minimum is the workaround.
      # continue-on-error: BalanceTest.t.sol exceeds stack limits even with
      # minimum IR optimization — known Foundry limitation
      - name: Run coverage
        run: forge coverage --ir-minimum --report summary
        continue-on-error: true

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Foundry
        uses: ./.github/actions/setup-foundry

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Slither
        run: slither .

      - name: Aderyn
        uses: Cyfrin/aderyn-ci@v0
        with:
          fail-on: high
