name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Foundry
        uses: ./.github/actions/setup-foundry

      - name: Check formatting
        run: forge fmt --check

      - name: Run tests
        run: forge test -vv

      # coverage requires via_ir disabled, --ir-minimum is the workaround
      - name: Run coverage
        run: forge coverage --ir-minimum --report summary --report lcov

      - name: Filter test/script from coverage
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq lcov > /dev/null
          lcov --remove lcov.info 'test/*' 'script/*' --output-file lcov.info --rc lcov_branch_coverage=1

      - name: Enforce minimum coverage
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: ./lcov.info
          minimum-coverage: 80

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Foundry
        uses: ./.github/actions/setup-foundry

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Slither
        run: slither .

      - name: Aderyn
        uses: Cyfrin/aderyn-ci@v0
        with:
          fail-on: high
